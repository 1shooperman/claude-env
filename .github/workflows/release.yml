name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            uploads.github.com:443

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          latest=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1)
          latest="${latest:-v0.0.0}"

          major=$(printf '%s' "$latest" | cut -d. -f1 | tr -d 'v')
          minor=$(printf '%s' "$latest" | cut -d. -f2)
          patch=$(printf '%s' "$latest" | cut -d. -f3)

          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          echo "version=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Generate release artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING=$(mktemp -d)

          # Version-stamp a copy of install.sh for the release asset.
          # The working-tree install.sh stays at "main" and is never committed.
          sed "s|^CLAUDENV_VERSION=.*|CLAUDENV_VERSION=\"${VERSION}\"|" \
            install.sh > "${STAGING}/install.sh"

          # Generate SHA256SUMS using just filenames (no path prefixes).
          sha256sum claudenv.sh > "${STAGING}/SHA256SUMS"
          (cd "${STAGING}" && sha256sum install.sh >> SHA256SUMS)

          echo "STAGING=${STAGING}" >> "$GITHUB_ENV"

      - name: Tag and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "${VERSION}" \
            claudenv.sh \
            "${STAGING}/install.sh" \
            "${STAGING}/SHA256SUMS" \
            --title "Release ${VERSION}" \
            --generate-notes \
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
